<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Secure Gateway Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-logo-box" onclick="window.location.href='index.html'">
            <div class="logo-badge">B</div>
            <div class="logo-text">BAZAAR<span>HUB</span></div>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width:auto; margin-top:0; padding:8px 20px; font-size:12px; font-weight: 700;">← Return to Store</button>
    </nav>

    <div class="container">
        <div class="checkout-grid">
            <div class="manifest-card">
                <h2 style="font-size: 18px; margin-bottom:24px; font-weight: 800;" class="accent-yellow"><i class="fas fa-shipping-fast"></i> Logistics Dispatch Manifest</h2>
                <form id="checkoutForm">
                    <div class="input-group">
                        <label>Delivery Full Address</label>
                        <input type="text" id="custAddress" required placeholder="Apartment, Street name, Block address...">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>City</label>
                            <input type="text" id="custCity" required placeholder="Karachi">
                        </div>
                        <div class="input-group">
                            <label>Contact Phone Number</label>
                            <input type="text" id="custPhone" required placeholder="03001234567">
                        </div>
                    </div>
                    <button type="submit" class="form-btn bg-yellow">CONFIRM & DEPLOY ORDER</button>
                </form>
            </div>

            <div class="summary-card">
                <h2 style="font-size: 18px; margin-bottom:24px; font-weight: 800;">Order Summary Basket</h2>
                <div id="checkoutSummaryItemsContainer">
                    </div>
                <div style="display:flex; justify-content:space-between; margin-top: 30px; padding-top:20px; border-top:1px solid #141726; font-weight:900; font-size:18px;">
                    <span>TOTAL AMOUNT DUE:</span>
                    <span class="accent-yellow" id="checkoutSummaryTotalDisplay">Rs. 0</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>s
