<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Transmit Order Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav style="padding: 10px 5%;">
        <div class="nav-logo-box" onclick="window.location.href='index.html'">
            <div class="logo-badge">B</div>
            <div class="logo-text">BAZAAR<span>HUB</span></div>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width:auto; margin-top:0; padding:6px 14px; font-size:12px;">← Return to Store</button>
    </nav>

    <div class="container">
        <div class="checkout-grid">
            <div class="manifest-card">
                <h2 class="section-title accent-yellow" style="font-size: 16px;"><i class="fas fa-truck" style="margin-right:8px;"></i> Logistics Dispatch Manifest</h2>
                <form id="checkoutForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                        <div>
                            <label>First Name</label>
                            <input type="text" id="custFirstName" required placeholder="Muhammad">
                        </div>
                        <div>
                            <label>Last Name</label>
                            <input type="text" id="custLastName" required placeholder="Ali">
                        </div>
                    </div>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label>Shipping Destination Address</label>
                        <input type="text" id="custAddress" required placeholder="Apartment, Street name, Block address...">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                        <div>
                            <label>City</label>
                            <input type="text" id="custCity" required placeholder="Karachi">
                        </div>
                        <div>
                            <label>Telemetry Phone Linked</label>
                            <input type="text" id="custPhone" required placeholder="03001234567">
                        </div>
                    </div>
                    <button type="submit" class="form-btn bg-yellow">CONFIRM & TRANSMIT ORDER</button>
                </form>
            </div>

            <div class="summary-card">
                <h2 class="section-title" style="font-size: 16px;">Order Summary</h2>
                <div id="checkoutSummaryItemsContainer"></div>
                <div style="display:flex; justify-content:space-between; margin-top: 20px; padding-top:15px; border-top:1px solid #1f2937; font-weight:800; font-size:16px;">
                    <span>TOTAL DUE:</span>
                    <span class="accent-yellow" id="checkoutSummaryTotalDisplay">Rs. 0</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
