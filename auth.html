<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub — Sign In</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <img src="assets/logo.png" alt="BazaarHub" class="logo-badge-img" style="margin: 0 auto 18px;">
            <h1 id="authHeading">Welcome back</h1>
            <p class="auth-sub" id="authSub">Sign in to browse the bazaar and track your orders.</p>

            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active" type="button">SIGN IN</button>
                <button id="registerTab" class="tab-btn" type="button">REGISTER</button>
            </div>

            <div id="loginError" class="auth-error hidden"></div>
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="loginPass" placeholder="••••••••" required>
                        <button type="button" class="toggle-visibility" data-target="loginPass"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-right-to-bracket"></i> Secure Login</button>
            </form>

            <div id="registerError" class="auth-error hidden"></div>
            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="name@domain.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="03001234567" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="regPass" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="toggle-visibility" data-target="regPass"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const heading = document.getElementById('authHeading');
            const sub = document.getElementById('authSub');

            function showLogin() {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                heading.innerText = 'Welcome back';
                sub.innerText = 'Sign in to browse the bazaar and track your orders.';
            }
            function showRegister() {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                heading.innerText = 'Join the bazaar';
                sub.innerText = 'Create an account to start shopping in minutes.';
            }

            loginTab?.addEventListener('click', showLogin);
            registerTab?.addEventListener('click', showRegister);

            document.querySelectorAll('.toggle-visibility').forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = document.getElementById(btn.getAttribute('data-target'));
                    const icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });
        });
    </script>
</body>
</html>
