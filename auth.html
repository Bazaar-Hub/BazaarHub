<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Security Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">CLIENT LOGIN</button>
                <button id="registerTab" class="tab-btn">REGISTER NOW</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">SECURE LOGIN</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="03XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">CREATE ACCOUNT</button>
            </form>        
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if(loginTab && registerTab) {
                loginTab.addEventListener('click', () => {
                    loginTab.classList.add('active');
                    registerTab.classList.remove('active');
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                });

                registerTab.addEventListener('click', () => {
                    registerTab.classList.add('active');
                    loginTab.classList.remove('active');
                    registerForm.classList.remove('hidden');
                    loginForm.classList.add('hidden');
                });
            }
        });
    </script>

    <div id="otpModal" class="auth-wrapper hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 5, 9, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div class="auth-card" style="border: 1px solid #facc15; text-align: center;">
        <h2 class="accent-yellow" style="font-size: 18px; margin-bottom: 10px; color: #facc15;">Phone Number Verification</h2>
        <p style="font-size: 12px; color: #9ca3af; margin-bottom: 20px;">We have generated a secure verification token for your phone. Please input the OTP code below to activate your account node.</p>
        
        <form id="otpVerifyForm">
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Enter 6-Digit OTP Code</label>
                <input type="text" id="inputOtpCode" placeholder="######" maxlength="6" required style="text-align: center; font-size: 18px; letter-spacing: 5px;">
            </div>
            <button type="submit" class="form-btn bg-yellow" style="width: 100%;">VERIFY & ACTIVATE PROFILE</button>
        </form>
    </div>
</div>
</body>
</html>
