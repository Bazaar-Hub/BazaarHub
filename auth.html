<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Security Access Access | Marketplace Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">

    <!-- Premium Redesigned Authentication Card -->
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">B</div>
            <div class="logo-text">BAZAAR<span class="accent-text">HUB</span></div>
            <p style="font-size:12px; color:var(--text-secondary); letter-spacing:1px; margin-top:5px; text-transform:uppercase; font-weight:700;">Global Network Access</p>
        </div>

        <div class="auth-tabs">
            <button id="tabLogin" class="tab-btn active">SECURE LOGIN</button>
            <button id="tabRegister" class="tab-btn">CREATE NODE MODULE</button>
        </div>

        <!-- Professional Form Components with Animated Labels -->
        <form id="logForm">
            <div class="input-group">
                <input type="email" id="loginEmail" required placeholder=" ">
                <label>Operational Email Registry</label>
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" required placeholder=" ">
                <label>Access Password Cipher</label>
            </div>
            <button type="submit" class="btn-primary">ACCESS NETWORK</button>
        </div>

        <form id="regForm" class="hidden">
            <div class="input-group">
                <input type="text" id="regName" required placeholder=" ">
                <label>Full Operational Identity Name</label>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" required placeholder=" ">
                <label>Operational Email Registry</label>
            </div>
            <div class="input-group">
                <input type="tel" id="regPhone" required placeholder=" ">
                <label>Phone Sequence Number</label>
            </div>
            <div class="input-group">
                <input type="password" id="regPass" required minlength="6" placeholder=" ">
                <label>Access Password Cipher (Min 6)</label>
            </div>
            <button type="submit" class="btn-primary">ACTIVATE ACCOUNT MODULE</button>
        </form>

        <p style="font-size:11px; color:var(--text-secondary); text-align:center; margin-top:30px; line-height:1.6;">Access implies acceptance of standard BazaarHub security protocols. Account data encrypted on global mesh servers.</p>
    </div>

    <!-- Main Javascript Module (Handles Firebase and UI logic) -->
    <script type="module" src="script.js"></script>

    <!-- Page Specific Tab Management with animation transitions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const logForm = document.getElementById('logForm');
            const regForm = document.getElementById('regForm');

            function showForm(formToShow, formToHide, activeTab, inactiveTab) {
                // Pre-transition animation could go here if needed.
                activeTab.classList.add('active');
                inactiveTab.classList.remove('active');
                formToShow.classList.remove('hidden');
                formToHide.classList.add('hidden');
                // forms fade in automatically due to CSS rules when 'hidden' class is removed.
            }

            if(tabLogin && tabRegister) {
                tabLogin.addEventListener('click', () => showForm(logForm, regForm, tabLogin, tabRegister));
                tabRegister.addEventListener('click', () => showForm(regForm, logForm, tabRegister, tabLogin));
            }
        });
    </script>
</body>
</html>
