<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Security Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">CLIENT LOGIN</button>
                <button id="registerTab" class="tab-btn">REGISTER NOW</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">SECURE LOGIN</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" value="+92" placeholder="03XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">CREATE ACCOUNT</button>
            </form>        
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if(loginTab && registerTab) {
                loginTab.addEventListener('click', () => {
                    loginTab.classList.add('active');
                    registerTab.classList.remove('active');
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                });

                registerTab.addEventListener('click', () => {
                    registerTab.classList.add('active');
                    loginTab.classList.remove('active');
                    registerForm.classList.remove('hidden');
                    loginForm.classList.add('hidden');
                });
            }
        });
    </script>
</body>
</html>
