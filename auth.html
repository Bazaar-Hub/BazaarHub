<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Security Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">CLIENT LOGIN</button>
                <button id="registerTab" class="tab-btn">REGISTER NOW</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">SECURE LOGIN</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" value="+92" placeholder="03XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="form-btn bg-yellow">CREATE ACCOUNT</button>
            </form>        
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if(loginTab && registerTab) {
                loginTab.addEventListener('click', () => {
                    loginTab.classList.add('active');
                    registerTab.classList.remove('active');
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                });

                registerTab.addEventListener('click', () => {
                    registerTab.classList.add('active');
                    loginTab.classList.remove('active');
                    registerForm.classList.remove('hidden');
                    loginForm.classList.add('hidden');
                });
            }
        });
    </script>

   <!-- Invisible Element required for Firebase standard safe handshake -->
<div id="recaptcha-container"></div>

<!-- NATIVE SMS CODE VALIDATION POPUP MODAL SCREEN -->
<div id="otpModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.96); z-index: 99999; display: none; align-items: center; justify-content: center;">
    <div style="background: #111827; border: 2px solid #facc15; padding: 30px; border-radius: 8px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0px 10px 25px rgba(0,0,0,0.5);">
        <h3 style="color: #facc15; margin-top: 0; font-family: sans-serif; font-size: 18px;">Verify Your Phone Number</h3>
        <p style="color: #9ca3af; font-size: 12px; font-family: sans-serif; line-height: 1.5; margin-bottom: 20px;">
            A 6-digit official verification code has been dispatched to your registered phone number via standard cellular SMS.
        </p>
        
        <div style="margin-bottom: 20px;">
            <input type="text" id="smsCodeField" placeholder="######" maxlength="6" style="width: 100%; padding: 12px; margin: 5px 0; text-align: center; font-size: 22px; letter-spacing: 6px; background: #030712; color: #fff; border: 1px solid #374151; border-radius: 6px; font-weight: bold;">
        </div>
        
        <button id="confirmOtpBtn" style="width: 100%; padding: 12px; background: #facc15; color: #0b0f19; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-transform: uppercase;">VERIFY & CREATE ACCOUNT</button>
        <button id="cancelOtpBtn" style="width: 100%; padding: 10px; margin-top: 10px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 6px; cursor: pointer; font-size: 12px;">Cancel & Fix Form</button>
    </div>
</div>

    <div id="recaptcha-container"></div>

<div id="otpModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 5, 9, 0.96); z-index: 99999; display: none; align-items: center; justify-content: center;">
    <div style="background: #111827; border: 2px solid #facc15; padding: 30px; border-radius: 8px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0px 10px 30px rgba(0,0,0,0.7);">
        <h3 style="color: #facc15; margin-top: 0; font-family: sans-serif; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">Enter Verification Code</h3>
        <p style="color: #9ca3af; font-size: 12px; font-family: sans-serif; line-height: 1.6; margin-bottom: 25px;">
            An official 6-digit authentication token has been transmitted via cellular SMS network to your registered mobile number.
        </p>
        
        <div style="margin-bottom: 20px;">
            <input type="text" id="smsCodeField" placeholder="######" maxlength="6" style="width: 100%; padding: 12px; margin: 5px 0; text-align: center; font-size: 24px; letter-spacing: 8px; background: #030712; color: #fff; border: 1px solid #374151; border-radius: 6px; font-weight: bold; font-family: monospace;">
        </div>
        
        <button id="confirmOtpBtn" style="width: 100%; padding: 14px; background: #facc15; color: #040509; font-weight: 800; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">VERIFY & ACTIVATE PROFILE</button>
        <button id="cancelOtpBtn" style="width: 100%; padding: 10px; margin-top: 12px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600;">Cancel & Re-edit Form</button>
    </div>
</div>
</body>
</html>
