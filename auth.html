<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Security Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic Styling tab toggle ke liye agar style.css load na ho sake */
        .hidden { display: none !important; }
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #050508; color: #fff; font-family: sans-serif; }
        .auth-card { background: #0d0d13; padding: 30px; border-radius: 12px; border: 1px solid #1f2937; width: 100%; max-width: 400px; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #14141c; color: #9ca3af; border: 1px solid #1f2937; cursor: pointer; border-radius: 6px; font-weight: 600; }
        .tab-btn.active { background: #facc15; color: #000; border-color: #facc15; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 10px; background: #14141c; border: 1px solid #1f2937; border-radius: 6px; color: #fff; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: #facc15; }
        .form-btn { width: 100%; padding: 12px; background: #facc15; color: #000; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .form-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">CLIENT LOGIN</button>
                <button id="registerTab" class="tab-btn">REGISTER NOW</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="form-btn">SECURE LOGIN</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="03XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="form-btn">CREATE ACCOUNT</button>
            </form>        
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        if(loginTab && registerTab) {
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            });

            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
