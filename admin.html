<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BazaarHub - Control Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body style="padding:20px 4%;">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div>
            <h1 style="font-size:20px; font-weight:900; text-transform:uppercase; color:#facc15;">Product Manager Terminal</h1>
            <p style="font-size:12px; color:#94a3b8;">Add system assets or inspect customer logistics pipelines.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width:auto; padding:8px 16px; font-size:12px;">Exit Console</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr; gap:30px;">
        <div class="support-card" style="background:#0d0d14;">
            <div class="support-title">Insert New Asset Item</div>
            <form id="addProductForm">
                <div class="input-group">
                    <label>Product Title Name</label>
                    <input type="text" id="pName" required/>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="input-group">
                        <label>Price (PKR)</label>
                        <input type="number" id="pPrice" required/>
                    </div>
                    <div class="input-group">
                        <label>Image Source Link URL</label>
                        <input type="text" id="pImg" required/>
                    </div>
                </div>
                <div class="input-group">
                    <label>Description Details</label>
                    <textarea id="pDesc" rows="3" required></textarea>
                </div>
                <button type="submit" class="form-btn bg-yellow">INJECT DATA NODE</button>
            </form>
        </div>

        <div class="support-card" style="background:#0d0d14;">
            <div class="support-title">Active Orders Dashboard Pipeline</div>
            <div style="overflow-x:auto;">
                <table style="width:100%; text-align:left; font-size:13px; border-collapse:collapse;">
                    <thead>
                        <tr style="border-bottom:1px solid rgba(255,255,255,0.08); color:#94a3b8;">
                            <th style="padding:10px;">Logistics Address</th>
                            <th style="padding:10px;">Phone No</th>
                            <th style="padding:10px;">Status Parameter</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrdersList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
