<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Admin Matrix Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 20px 4%;">

    <header class="admin-header">
        <div>
            <h1 class="accent-yellow" style="font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Product Catalog Manager</h1>
            <p style="font-size: 12px; color: #9ca3af;">Inject custom structural assets and track incoming client purchase orders pipelines.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width: auto; padding: 10px 20px; margin-top:0; font-size:12px; font-weight: 800;">Exit Admin Panel</button>
    </header>

    <div class="admin-layout">
        <div style="background-color: #0b0b12; border: 1px solid #1e2235; padding: 25px; border-radius: 16px;">
            <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;">Inject Product Asset</h2>
            <form id="addProductForm">
                <div class="input-group">
                    <label>Product Domain Name</label>
                    <input type="text" id="pName" placeholder="e.g. Wireless Headset Pro" required>
                </div>
                <div class="input-group">
                    <label>Category Stream Tag</label>
                    <input type="text" id="pCategory" placeholder="e.g. ELECTRONICS" required>
                </div>
                <div class="input-group">
                    <label>Price Rate Value (PKR)</label>
                    <input type="number" id="pPrice" placeholder="e.g. 3500" required>
                </div>
                <div class="input-group">
                    <label>Source Image Asset URL Link</label>
                    <input type="url" id="pImage" placeholder="https://images.unsplash.com/..." required>
                </div>
                <div class="input-group">
                    <label>Feature Structural Descriptions</label>
                    <textarea id="pDesc" rows="3" placeholder="Write specifications text details..." required></textarea>
                </div>
                <button type="submit" id="formSubmitBtn" class="form-btn bg-yellow">SAVE NODE MODULE</button>
            </form>
        </div>

        <div>
            <div style="background-color: #0b0b12; border: 1px solid #1e2235; padding: 25px; border-radius: 16px; margin-bottom: 25px;">
                <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;">Current Vault Products</h2>
                <div id="adminProductsList" style="max-height: 240px; overflow-y: auto; padding-right: 5px;"></div>
            </div>

            <div style="background-color: #0b0b12; border: 1px solid #1e2235; padding: 25px; border-radius: 16px;">
                <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;">Customer Orders Tracking Matrix</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Logistics Info</th>
                                <th>Items</th>
                                <th>Cost</th>
                                <th>Workflow Status</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
