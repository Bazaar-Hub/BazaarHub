<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Admin Matrix Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px 5%;">

    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; animation: fadeInLeft var(--transition-slow) forwards;">
        <div>
            <p class="subheading" style="color: var(--danger); font-weight: 800;"><i class="fas fa-user-shield"></i> SECURE CONTROL CORE</p>
            <h1 class="heading-primary accent-text" style="margin-bottom: 5px;">Product Catalog Manager</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">Inject premium assets and track client purchase pipeline in real-time.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="btn-primary" style="width: auto; padding: 12px 24px; font-size: 13px;">Exit Control Panel</button>
    </header>

    <div class="admin-layout" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; animation: fadeInScale var(--transition-slow) 0.1s forwards; opacity: 0;">
        
        <div style="background-color: var(--bg-card); border: 1px solid var(--border-bright); padding: 35px; border-radius: 24px; position: relative; overflow: hidden;">
            <h2 style="font-size: 18px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px;" class="accent-text"><i class="fas fa-plus-circle"></i> Inject New Asset</h2>
            
            <form id="addProductForm">
                <div class="input-group">
                    <input type="text" id="pName" required placeholder=" ">
                    <label>Product Display Name</label>
                </div>
                <div class="input-group">
                    <input type="number" id="pPrice" required placeholder=" ">
                    <label>Asset Base Value (PKR)</label>
                </div>
                <div class="input-group">
                    <input type="url" id="pImg" required placeholder=" ">
                    <label>Cloud Image Resource URL</label>
                </div>
                <div class="input-group">
                    <textarea id="pDesc" required rows="3" placeholder=" " style="resize: none;"></textarea>
                    <label>Asset Parameter Description</label>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Node Module</button>
            </form>
        </div>

        <div style="display: flex; flex-direction: column; gap: 30px;">
            
            <div style="background-color: var(--bg-card); border: 1px solid var(--border-bright); padding: 30px; border-radius: 24px;">
                <h2 style="font-size: 15px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;"><i class="fas fa-boxes"></i> Current Vault Products</h2>
                <div id="adminProductsList" style="max-height: 260px; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 12px;">
                    </div>
            </div>

            <div style="background-color: var(--bg-card); border: 1px solid var(--border-bright); padding: 30px; border-radius: 24px;">
                <h2 style="font-size: 15px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;" class="accent-text"><i class="fas fa-stream"></i> Logistics Matrix</h2>
                <div class="table-wrapper" style="border: 1px solid var(--border-dim); border-radius: 12px; overflow: hidden; background: #050508;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                        <thead>
                            <tr style="background-color: #121220; color: var(--accent); border-bottom: 1px solid var(--border-bright);">
                                <th style="padding: 14px;">Client Logistics</th>
                                <th style="padding: 14px;">Items</th>
                                <th style="padding: 14px;">Value</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersList">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
