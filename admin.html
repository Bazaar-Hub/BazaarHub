<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Admin Terminal Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 0 4%;">

    <div id="popupToast" class="custom-toast"></div>

    <nav style="background:transparent; border-bottom:none; padding: 30px 0;">
        <div>
            <h1 class="accent-yellow" style="font-size: 24px; font-weight: 900; text-transform: uppercase;">Product Catalog Manager</h1>
            <p style="font-size: 12px; color: #9ca3af; margin-top:4px;">Inject data nodes and monitor real-time user checkout logs arrays pipelines.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width: auto; padding: 10px 26px; margin-top:0; font-size:12px; font-weight: 800;">Exit Control Console</button>
    </nav>

    <div class="admin-layout" style="padding-bottom: 50px;">
        <div style="background-color: #0a0b14; border: 1px solid #131525; padding: 30px; border-radius: 26px;">
            <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 24px; letter-spacing: 0.5px;">Inject Product Node Asset</h2>
            <form id="addProductForm">
                <div class="input-group">
                    <label>Product Domain Name</label>
                    <input type="text" id="pName" placeholder="e.g. Wireless Headset Pro" required>
                </div>
                <div class="input-group">
                    <label>Category Tag</label>
                    <input type="text" id="pCategory" placeholder="e.g. ELECTRONICS" required>
                </div>
                <div class="input-group">
                    <label>Price Rate Value (PKR)</label>
                    <input type="number" id="pPrice" placeholder="e.g. 3500" required>
                </div>
                <div class="input-group">
                    <label>Source Image Asset URL Link</label>
                    <input type="url" id="pImage" placeholder="https://images.unsplash.com/..." required>
                </div>
                <div class="input-group">
                    <label>Structural Descriptions</label>
                    <textarea id="pDesc" rows="3" placeholder="Write specifications text details..." required></textarea>
                </div>
                <button type="submit" id="formSubmitBtn" class="form-btn bg-yellow">SAVE PARAMETERS TO MATRIX</button>
            </form>
        </div>

        <div>
            <div style="background-color: #0a0b14; border: 1px solid #131525; padding: 30px; border-radius: 26px; margin-bottom: 30px;">
                <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;">Current Vault Products</h2>
                <div id="adminProductsList" style="max-height: 260px; overflow-y: auto; padding-right: 4px;"></div>
            </div>

            <div style="background-color: #0a0b14; border: 1px solid #131525; padding: 30px; border-radius: 26px;">
                <h2 style="font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px;">Customer Orders Tracking Dashboard</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Logistics Info</th>
                                <th>Purchased Items</th>
                                <th>Cost</th>
                                <th>Workflow Status</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
