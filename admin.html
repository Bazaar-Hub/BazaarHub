<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Admin Matrix Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 20px 4%; background-color: #050508; color: #ffffff;">

    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1f2937; padding-bottom: 15px;">
        <div>
            <h1 class="accent-yellow" style="font-size: 20px; font-weight: 800; text-transform: uppercase; color: #facc15;">Product Catalog Manager</h1>
            <p style="font-size: 11px; color: #9ca3af;">Add custom entries and route multiple item customer checkout arrays pipelines.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width: auto; padding: 8px 16px; margin-top:0; font-size:12px; background-color: #facc15; color: black; font-weight: bold; border-radius: 6px;">Exit Admin Panel</button>
    </header>

    <div class="admin-layout" style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px;">
        <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; height: fit-content;">
            <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px; color: #facc15;">Manage Digital Asset</h2>
            <form id="productCrudForm">
                <input type="hidden" id="crudProductId" value="">
                
                <div style="margin-bottom: 12px;">
                    <label style="font-size: 12px; color: #9ca3af;">Product Title</label>
                    <input type="text" id="crudTitle" required style="width:100%; background:#14141c; border:1px solid #1f2937; color:white; padding:8px; border-radius:6px; margin-top:4px;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label style="font-size: 12px; color: #9ca3af;">Category</label>
                    <input type="text" id="crudCategory" required style="width:100%; background:#14141c; border:1px solid #1f2937; color:white; padding:8px; border-radius:6px; margin-top:4px;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label style="font-size: 12px; color: #9ca3af;">Price (Rs.)</label>
                    <input type="number" id="crudPrice" required style="width:100%; background:#14141c; border:1px solid #1f2937; color:white; padding:8px; border-radius:6px; margin-top:4px;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label style="font-size: 12px; color: #9ca3af;">Image URL</label>
                    <input type="text" id="crudImg" required style="width:100%; background:#14141c; border:1px solid #1f2937; color:white; padding:8px; border-radius:6px; margin-top:4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 12px; color: #9ca3af;">Description</label>
                    <textarea id="crudDesc" rows="3" required style="width:100%; background:#14141c; border:1px solid #1f2937; color:white; padding:8px; border-radius:6px; margin-top:4px; resize: none;"></textarea>
                </div>
                <button type="submit" id="crudFormSubmitBtn" class="form-btn bg-yellow" style="width:100%; padding:10px; background-color:#facc15; color:black; font-weight:bold; border-radius:6px;">SAVE NODE MODULE</button>
            </form>
        </div>

        <div>
            <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px; color: #facc15;">Current Vault Products</h2>
                <div id="adminProductsList" style="max-height: 250px; overflow-y: auto;">
                    </div>
            </div>

            <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px;">
                <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px; color: #facc15;">Customer Orders Tracking Matrix</h2>
                <div class="table-wrapper" style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #1f2937; color: #9ca3af; font-size: 12px;">
                                <th style="padding: 10px;">Logistics Manifest Info</th>
                                <th style="padding: 10px;">Purchased Items Grid</th>
                                <th style="padding: 10px;">Status Badge</th>
                                <th style="padding: 10px;">Control Dispatches</th>
                            </tr>
                        </thead>
                        <tbody id=\"adminOrdersList\" style="font-size: 13px;">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
