<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub — Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="padding-top:30px;">

    <header class="admin-header">
        <div>
            <span class="eyebrow">RESTRICTED · ADMIN ROLE ONLY</span>
            <h1 class="accent-gold">Catalog &amp; Orders Console</h1>
            <p>Manage live inventory and track incoming customer orders.</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="window.location.href='index.html'" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Exit to Store</button>
            <button id="logoutBtn" class="btn btn-danger"><i class="fas fa-arrow-right-from-bracket"></i> Logout</button>
        </div>
    </header>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-label">Products Live</div>
            <div class="stat-value" id="statTotalProducts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="statTotalOrders">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending Dispatch</div>
            <div class="stat-value" id="statPending">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Revenue</div>
            <div class="stat-value" id="statRevenue">Rs 0</div>
        </div>
    </div>

    <div class="admin-layout">
        <div class="admin-card">
            <h2 class="admin-card-title">Add a Product</h2>
            <form id="addProductForm">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Wireless Headset Pro" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <input type="text" id="pCategory" placeholder="e.g. Electronics" required>
                </div>
                <div class="input-group">
                    <label>Price (PKR)</label>
                    <input type="number" id="pPrice" placeholder="e.g. 3500" min="0" step="1" required>
                </div>
                <div class="input-group">
                    <label>Image URL</label>
                    <input type="url" id="pImage" placeholder="https://images.unsplash.com/…" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="pDesc" rows="3" placeholder="Key features and specifications…" required></textarea>
                </div>
                <button type="submit" id="formSubmitBtn" class="btn btn-primary btn-block"><i class="fas fa-circle-plus"></i> Save Product</button>
            </form>
        </div>

        <div>
            <div class="admin-card">
                <div class="admin-card-title">
                    <span>Current Inventory</span>
                    <div class="mini-search">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" id="adminProductSearch" placeholder="Search inventory…">
                    </div>
                </div>
                <div id="adminProductsList" style="max-height: 260px; overflow-y: auto; padding-right: 5px;"></div>
            </div>

            <div class="admin-card" style="margin-bottom:0;">
                <h2 class="admin-card-title">Customer Orders</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Delivery Info</th>
                                <th>Items</th>
                                <th>Cost</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <script type="module" src="script.js"></script>
</body>
</html>
