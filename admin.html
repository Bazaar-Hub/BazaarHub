<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Admin Matrix Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 20px 4%;">

    <header class="admin-header">
        <div>
            <h1 class="accent-yellow" style=\"font-size: 20px; font-weight: 800; text-transform: uppercase;\">Product Catalog Manager</h1>
            <p style="font-size: 11px; color: #9ca3af;">Add custom entries and route multiple item customer checkout arrays pipelines.</p>
        </div>
        <button onclick="window.location.href='index.html'" class="form-btn bg-yellow" style="width: auto; padding: 8px 16px; margin-top:0; font-size:12px;">Exit Admin Panel</button>
    </header>

    <div class="admin-layout">
        <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px;">
            <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px;">Vault Provisioning Node</h2>
            <form id="addProductForm">
                <input type="hidden" id="editIndex">
                <div class="input-group">
                    <label>Product System Name</label>
                    <input type="text" id="pName" required placeholder="Premium Cyber Jacket">
                </div>
                <div class="input-group">
                    <label>Category Router</label>
                    <select id="pCategory" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Home Decor">Home Decor</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Price Value (PKR)</label>
                    <input type="number" id="pPrice" required placeholder="5999">
                </div>
                <div class="input-group">
                    <label>Secure Content Image URL</label>
                    <input type="url" id="pImage" required placeholder="https://images.unsplash.com/photo-...">
                </div>
                <div class="input-group">
                    <label>Product Architectural Specifications</label>
                    <textarea id="pDesc" rows="3" placeholder="Enter specifications or layout details..."></textarea>
                </div>
                <button type="submit" id="formSubmitBtn" class="form-btn bg-yellow">SAVE NODE MODULE</button>
            </form>
        </div>

        <div>
            <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px;">Current Vault Products</h2>
                <div id="adminProductsList" style="max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div style="background-color: #0d0d13; border: 1px solid #1f2937; padding: 20px; border-radius: 12px;">
                <h2 style="font-size: 14px; text-transform: uppercase; margin-bottom: 15px;">Customer Orders Tracking Matrix</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Logistics Manifest Info</th>
                                <th>Purchased Items Grid</th>
                                <th>Status Badge</th>
                                <th>Workflow Control Dispatches</th>
                            </tr>
                        </thead>
                        <tbody id=\"adminOrdersList\"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
