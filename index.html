<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth & Firestore Integration</title>
    <style>
        :root {
            --primary: #4f46e5;
            --background: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e5e7eb;
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: 2px solid var(--primary);
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover {
            background-color: #4338ca;
        }
        #dashboard {
            display: none;
            text-align: center;
        }
        .logout-btn {
            background-color: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Auth Section -->
        <div id="auth-section">
            <div class="tabs">
                <button class="tab-btn active" id="tab-login">Login</button>
                <button class="tab-btn" id="tab-register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="form-panel active">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPass">Password</label>
                    <input type="password" id="loginPass" required placeholder="••••••••">
                </div>
                <button type="submit">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="form-panel">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label for="regPass">Password</label>
                    <input type="password" id="regPass" required placeholder="••••••••">
                </div>
                <button type="submit">Create Account</button>
            </form>
        </div>

        <!-- Dashboard Section (Post-Login) -->
        <div id="dashboard">
            <h2>Welcome, <span id="user-display-name">User</span>!</h2>
            <p>You have successfully authenticated with Firebase.</p>
            <p>Email: <span id="user-display-email"></span></p>
            <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // ⚠️ APNI FIREBASE CONFIGURATION YAHAN PASTE KAREIN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DOM Elements ---
        const authSection = document.getElementById('auth-section');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        
        const userDisplayName = document.getElementById('user-display-name');
        const userDisplayEmail = document.getElementById('user-display-email');
        const logoutBtn = document.getElementById('logoutBtn');

        // --- UI Tabs Toggle Logic ---
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // --- 1. USER REGISTRATION (Auth + Firestore) ---
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;

            try {
                // Firebase Auth mein user create karna
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Firestore Database mein extra data (Name) save karna
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    fullName: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                alert('Account successfully created!');
                registerForm.reset();
            } catch (error) {
                console.error("Registration Error:", error);
                alert("Registration Failed: " + error.message);
            }
        });

        // --- 2. USER LOGIN ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert('Logged in successfully!');
                loginForm.reset();
            } catch (error) {
                console.error("Login Error:", error);
                alert("Login Failed: " + error.message);
            }
        });

        // --- 3. AUTH STATE OBSERVER (Track User Session) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User logged in hai, Firestore se uska naam nikaalein
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        userDisplayName.textContent = docSnap.data().fullName;
                    } else {
                        userDisplayName.textContent = "User";
                    }
                } catch (err) {
                    console.error("Error fetching user document:", err);
                    userDisplayName.textContent = "User";
                }

                userDisplayEmail.textContent = user.email;
                
                // Show Dashboard, Hide Auth Forms
                authSection.style.display = 'none';
                dashboard.style.display = 'block';
            } else {
                // User logged out hai
                authSection.style.display = 'block';
                dashboard.style.display = 'none';
            }
        });

        // --- 4. SIGN OUT ---
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                alert('Signed out successfully.');
            }).catch((error) => {
                alert('Error signing out: ' + error.message);
            });
        });
    </script>
</body>
</html>
