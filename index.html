<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Dashboard Showcase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-logo-box" onclick="window.location.href='index.html'">
            <div class="logo-badge">B</div>
            <div class="logo-text">BAZAAR<span>HUB</span></div>
        </div>
        <div class="nav-center">
            <a href="index.html" class="accent-yellow">Home Catalog</a>
            <a href="checkout.html">Checkout Console</a>
            <a href="admin.html" style="color: #fca5a5;"><i class="fas fa-user-shield"></i> Admin Panel</a>
        </div>
        <div class="nav-right">
            <div class="cart-icon" onclick="window.location.href='checkout.html'">
                <i class="fas fa-shopping-basket"></i>
                <span id="cartCount" class="cart-count">0</span>
            </div>
            <button id="logoutBtn" style="color: #f87171; font-size: 14px; font-weight: 700;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 30px; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; font-weight: 800;">Available Store Pipeline</h2>
        <div id="productsGrid" class="grid">
            </div>
    </div>

    <script type="module" src="script.js"></script>

</html>
