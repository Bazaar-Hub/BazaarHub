<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarHub - Master Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-logo-box" onclick="window.location.href='index.html'">
            <div class="logo-badge">B</div>
            <div class="logo-text">BAZAAR<span class="accent-yellow">HUB</span></div>
        </div>
        <div class="nav-center">
            <a href="index.html" class="accent-yellow">Home Catalog</a>
            <a href="checkout.html">Checkout Console</a>
            <a href="admin.html" style="color: #ef4444;"><i class="fas fa-user-shield"></i> Admin Panel</a>
        </div>
        <div class="nav-right">
            <div class="cart-icon" onclick="window.location.href='checkout.html'">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" class="cart-count">0</span>
            </div>
            <button id="logoutBtn" style="color: #ef4444; font-size: 13px; font-weight: bold; letter-spacing:0.5px;"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 30px; text-transform: uppercase; font-size: 22px; letter-spacing: 1.5px; font-weight: 800;">Available Products Pipeline</h2>
        <div id="productsGrid" class="grid"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
